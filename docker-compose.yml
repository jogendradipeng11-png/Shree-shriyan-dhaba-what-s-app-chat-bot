version: '3.8'

services:
  evolution-api:
    image: evolix/evolution-api:latest
    container_name: dhaba-evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=shree_shriyan_dhaba_2026_secret
      - STORE_CLEANING_INTERVAL=7200
      - DATABASE_ENABLED=true
      - DATABASE_TYPE=firebase
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_DATABASE_URL=https://dhaba-bills-default-rtdb.firebaseio.com
    volumes:
      - ./auth:/app/auth
      - ./instances:/app/instances
