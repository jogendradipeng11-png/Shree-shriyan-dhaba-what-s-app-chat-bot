<!DOCTYPE html>
<html>
<head><title>Dhaba GOAT Admin Panel</title><style>body{font-family:Arial;background:#f4f4f4;padding:20px;}</style></head>
<body>
  <h1>🔥 Shree & Shriyan Dhaba - GOAT Admin</h1>
  <h2>Live WhatsApp + Table Orders</h2>
  <div id="orders"></div>

  <script>
    async function loadOrders() {
      const res = await fetch('/api/orders');
      const data = await res.json();
      let html = '';
      Object.keys(data).forEach(key => {
        const o = data[key];
        html += `<div style="background:white;padding:15px;margin:10px 0;border-radius:10px;">
          <strong>Table: ${o.table || 'WhatsApp'}</strong> | ${o.name} | ₹${o.total}<br>
          Status: ${o.status} | <button onclick="updateStatus('${key}','ready')">Mark Ready</button>
        </div>`;
      });
      document.getElementById('orders').innerHTML = html || '<p>No orders yet</p>';
    }
    setInterval(loadOrders, 5000);
    loadOrders();
  </script>
</body>
</html>
